name: CodeQL

# MVP security gate (HX-Fortress OSS Readiness Plan, Part 4.2): GitHub-native
# static analysis with the security-extended query suite. Third-party actions
# are pinned to a full commit SHA (tag recorded in the trailing comment).

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * 1" # weekly (Mon 07:00 UTC)

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the code-scanning dashboard
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
