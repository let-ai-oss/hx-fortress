name: Release

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "Dockerfile"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: hx-fortress-release
  cancel-in-progress: false

jobs:
  release:
    name: Cross-compile and publish hx-fortress
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read Fortress version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(bun -e 'import pkg from "./package.json"; console.log(pkg.version)')"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must be a stable semver: $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Derive short SHA
        id: short-sha
        shell: bash
        run: |
          set -euo pipefail
          echo "value=${GITHUB_SHA:0:8}" >> "$GITHUB_OUTPUT"

      - name: Compile darwin/linux binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          printf '%s\n' "${{ steps.version.outputs.value }}" > dist/hx-fortress-version

          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-arm64 bun-linux-x64; do
            out_name="hx-fortress-${target#bun-}"
            out_path="dist/${out_name}"

            # x64 artifacts compile against Bun's -baseline runtime so they run
            # on CPUs without AVX2. The default x64 build embeds an AVX2-only
            # runtime; on older / virtualized CPUs it warns "CPU lacks AVX
            # support" and crashes (MC-2366). Cross-compiled binaries can't
            # auto-detect the target CPU, so we pick the widely-compatible
            # variant. arm64 has no such split. The asset name keeps the plain
            # x64 suffix so the installer + download proxy are unchanged.
            build_target="$target"
            case "$target" in
              *-x64) build_target="${target}-baseline" ;;
            esac

            echo "::group::Build $out_name ($build_target)"
            bun build \
              --compile \
              --minify \
              --target="$build_target" \
              ./src/cli.ts \
              --outfile "$out_path"
            sha256sum "$out_path" | awk -v name="$out_name" '{print $1"  "name}' \
              > "${out_path}.sha256"
            gzip -9 -f "$out_path"
            ls -la "${out_path}.gz" "${out_path}.sha256"
            echo "::endgroup::"
          done

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          tag="builds/hx-fortress-${version}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes
          fi

          # Move the tag with git instead of relying on gh's --target, which is
          # silently ignored when the tag already exists, and --cleanup-tag,
          # whose deletion is eventually-consistent and races the recreation.
          # That combination left the release on the new commit while the tag
          # stayed pinned to the previous one. git makes the tag position
          # deterministic before we attach the release to it.
          git tag -f "$tag" "$GITHUB_SHA"
          git push origin --force "refs/tags/$tag"

          gh release create "$tag" dist/hx-fortress-* \
            --title "HX Fortress build v$version" \
            --notes "Build from ${GITHUB_SHA:0:8} (HX Fortress v$version)." \
            --prerelease=false \
            --latest=false

      - name: Set up Docker Buildx
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive Docker metadata
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/let-ai-oss/hx-fortress
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=sha-${{ steps.short-sha.outputs.value }}

      - name: Build and push Docker image
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

      - name: Dispatch let-forge Fortress redeploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.LET_FORGE_REPO_DISPATCH_TOKEN }}
          repository: let-ai/let-forge
          event-type: hx-fortress-image-published
          client-payload: >-
            {"version":"${{ steps.version.outputs.value }}","sha":"${{ github.sha }}","short_sha":"${{ steps.short-sha.outputs.value }}","image":"ghcr.io/let-ai-oss/hx-fortress:sha-${{ steps.short-sha.outputs.value }}","tags":["ghcr.io/let-ai-oss/hx-fortress:latest","ghcr.io/let-ai-oss/hx-fortress:${{ steps.version.outputs.value }}","ghcr.io/let-ai-oss/hx-fortress:sha-${{ steps.short-sha.outputs.value }}"]}

      - name: Publish immutable release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          tag="releases/hx-fortress-${version}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; skipping immutable release"
            exit 0
          fi

          gh release create "$tag" dist/hx-fortress-* \
            --title "HX Fortress v$version" \
            --notes "Published from ${GITHUB_SHA:0:8}." \
            --target "$GITHUB_SHA" \
            --latest=false
