name: Security

# MVP security gate (HX-Fortress OSS Readiness Plan, Part 4.1): secret scanning
# over full history, SAST, and dependency/supply-chain audit. All third-party
# actions are pinned to a full commit SHA; the trailing comment records the tag
# that SHA corresponds to for readability.

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1" # weekly (Mon 06:00 UTC) — catches newly published rules/CVEs

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scanning (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks/trufflehog scan every commit

      - name: Gitleaks (full history)
        # Run the gitleaks CLI directly (image pinned by digest) instead of
        # gitleaks-action. Two reasons:
        #   1. Scan ALL history on every event (--log-opts=--all). gitleaks-action
        #      scans only the latest commit(s) on push/PR, so the plan's §1.1
        #      "secret scanning over full history" gate was not actually met.
        #   2. The OSS CLI needs no license — the org-license requirement lives
        #      only in the action wrapper (so GITLEAKS_LICENSE is no longer used).
        # .gitleaks.toml (extends defaults) allowlists the secret-shaped scrub
        # TEST fixtures in test/embed-scrub.test.ts; every other file is scanned.
        # safe.directory is injected via env because the mounted repo is owned by
        # the runner user, not the container's root (avoids git "dubious ownership").
        # --redact keeps any match out of the logs.
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --log-opts=--all --redact -v --exit-code 1 --config /repo/.gitleaks.toml

      - name: TruffleHog (verified only)
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --only-verified

  sast:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Semgrep scan
        # The Semgrep GitHub Action (returntocorp/semgrep-action) is deprecated;
        # the supported path is the official container, run here via `docker run`
        # (rather than a job `container:`) so checkout runs on the runner and we
        # avoid the Node-in-container pitfall. Pinned by image digest — the
        # container-equivalent of a SHA pin. --config auto pulls JS/TS security +
        # OWASP rulesets.
        # Gate on ERROR severity only (the plan's "zero High/Critical" criterion,
        # §1.2); --error then fails CI when any ERROR-level finding remains.
        # Lower-severity community-hygiene rules stay informational — drop
        # --severity to see them in a full local/scheduled triage.
        # NB: --config auto requires metrics to be enabled (it selects rules via
        # the Semgrep registry), so we do not set SEMGREP_SEND_METRICS=off here.
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e \
            semgrep scan --config auto --severity ERROR --error

  deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # bun audit is informational only: the pinned Bun exposes no severity
      # threshold or per-advisory ignore (only --json), so it cannot serve as a
      # gate. OSV-Scanner below is the authoritative gate (plan §1.3).
      - name: bun audit (informational)
        run: bun audit || true

      - name: OSV-Scanner (authoritative gate)
        # Reads osv-scanner.toml for documented, time-boxed exceptions; fails on
        # any un-excepted High/Critical against bun.lock.
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=bun.lock
