name: Dev Build

on:
  workflow_dispatch:

concurrency:
  group: hx-fortress-dev-build-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  dev-build:
    name: Cross-compile and publish a per-branch dev build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read Fortress version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(bun -e 'import pkg from "./package.json"; console.log(pkg.version)')"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must be a stable semver: $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      # keep in sync with release.yml "Compile darwin/linux binaries"
      - name: Compile darwin/linux binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          printf '%s\n' "${{ steps.version.outputs.value }}" > dist/hx-fortress-version

          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-arm64 bun-linux-x64; do
            out_name="hx-fortress-${target#bun-}"
            out_path="dist/${out_name}"
            build_target="$target"
            case "$target" in
              *-x64) build_target="${target}-baseline" ;;
            esac
            echo "::group::Build $out_name ($build_target)"
            bun build \
              --compile \
              --minify \
              --target="$build_target" \
              ./src/cli.ts \
              --outfile "$out_path"
            sha256sum "$out_path" | awk -v name="$out_name" '{print $1"  "name}' \
              > "${out_path}.sha256"
            gzip -9 -f "$out_path"
            ls -la "${out_path}.gz" "${out_path}.sha256"
            echo "::endgroup::"
          done

      - name: Publish per-branch dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          branch="${GITHUB_REF_NAME}"
          slug="$(printf '%s' "$branch" | tr -c 'A-Za-z0-9._-' '-')"
          tag="dev/hx-fortress-${slug}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes --cleanup-tag
          fi

          gh release create "$tag" dist/hx-fortress-* \
            --title "HX Fortress dev (${branch}) v${version} @ ${GITHUB_SHA:0:8}" \
            --notes "Dev build of ${branch} from ${GITHUB_SHA:0:8} (HX Fortress v${version}). Not for release." \
            --target "$GITHUB_SHA" \
            --prerelease=true \
            --latest=false
