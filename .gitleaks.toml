# gitleaks configuration for hx-fortress
#
# Extends the built-in gitleaks ruleset (all default detectors stay active) and
# adds a narrow allowlist for the intentionally secret-shaped TEST FIXTURES that
# exercise the embedding-scrub logic. These are not live credentials — they are
# high-entropy strings crafted to prove the scrubber redacts secrets. A
# full-history scan (`--log-opts=--all --redact`) flagged 6 of them; every match
# came back REDACTED and none is a real key, so no rotation is required.
#
# The fixtures lived only in `test/embed-scrub.test.ts` (added in commit
# 421686b, later refactored out of HEAD). The path regex below covers every
# commit that ever touched that file. The fingerprints are listed as an
# auditable record of exactly what was reviewed and waived.
#
# Full-history findings waived here (all REDACTED, all fixtures):
#   421686b…:test/embed-scrub.test.ts:generic-api-key:16
#   421686b…:test/embed-scrub.test.ts:stripe-access-token:14
#   421686b…:test/embed-scrub.test.ts:stripe-access-token:15
#   421686b…:test/embed-scrub.test.ts:stripe-access-token:77
#   421686b…:test/embed-scrub.test.ts:stripe-access-token:83

title = "hx-fortress gitleaks config"

[extend]
# Pull in the maintained default rules so we only ADD an allowlist, never
# weaken detection.
useDefault = true

[[allowlists]]
description = "Redacted secret-scrub test fixtures (test/embed-scrub.test.ts) — not live secrets"
# Any secret found inside this test file, in any commit, is a fixture. Scoping
# by path (not a blanket regex) keeps every other file fully scanned.
paths = [
  '''test/embed-scrub\.test\.ts''',
]
