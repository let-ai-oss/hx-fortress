[[IgnoredVulns]]
id = "GHSA-67mh-4wv8-2f99"
ignoreUntil = 2026-10-13
# esbuild <=0.24.2 dev-server CORS issue. Reaches the tree only as a transitive
# DEV dependency of drizzle-kit (via the abandoned @esbuild-kit/esm-loader, which
# pins esbuild ~0.18.20). The vulnerable feature is `esbuild serve`; this repo
# never runs the esbuild dev server and esbuild is not part of the shipped binary.
# Fixed upstream in esbuild 0.25.0, but the @esbuild-kit loader cannot take it
# without breaking. Not reachable/exploitable here. Re-triage when drizzle-kit
# drops @esbuild-kit or by the review date above.
reason = "esbuild dev-server CORS (GHSA-67mh-4wv8-2f99): dev-only transitive via drizzle-kit; esbuild serve is never used and esbuild is not shipped. Unreachable."
